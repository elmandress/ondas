[build]
  # No declaramos `publish`: el adaptador oficial de Netlify para Next.js
  # (OpenNext) detecta el output y monta las funciones server-side
  # automáticamente. Si seteamos publish=".next" Netlify trata la carpeta
  # como estática y devuelve 404 porque no hay index.html (Next 16 con App
  # Router no genera uno: las páginas son server-rendered).
  #
  # Tampoco declaramos [[plugins]] @netlify/plugin-nextjs: la doc oficial
  # recomienda NO pinearlo — Netlify aplica la última versión en cada build.
  command = "npm run build"

[build.environment]
  NODE_VERSION = "22"
  NEXT_TELEMETRY_DISABLED = "1"
  # better-sqlite3 necesita compilarse contra el Node de Netlify Functions
  NPM_FLAGS = "--include=optional"

# Bundlear los archivos de datos (gtfs.db, mvd-pois.json, variant_to_line.json)
# en las API routes serverless. schedule.db (84MB) excluido por tamaño.
[functions]
  included_files = [
    "data/gtfs.db",
    "data/mvd-pois.json",
    "data/variant_to_line.json",
    "data/line-hours.json"
  ]
  external_node_modules = ["better-sqlite3"]
  node_bundler = "nft"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(self)"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
