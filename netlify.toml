[build]
  # No declaramos `publish`: el adaptador oficial de Netlify para Next.js
  # (OpenNext) detecta el output y monta las funciones server-side
  # automáticamente. Si seteamos publish=".next" Netlify trata la carpeta
  # como estática y devuelve 404 porque no hay index.html (Next 16 con App
  # Router no genera uno: las páginas son server-rendered).
  #
  # Tampoco declaramos [[plugins]] @netlify/plugin-nextjs: la doc oficial
  # recomienda NO pinearlo — Netlify aplica la última versión en cada build.
  command = "npm run build"

[build.environment]
  NODE_VERSION = "22"
  NEXT_TELEMETRY_DISABLED = "1"
  # better-sqlite3 necesita compilarse contra el Node de Netlify Functions
  NPM_FLAGS = "--include=optional"

# Bundlear los archivos de datos que el server lee en runtime dentro de las API
# routes serverless. REGLA: todo dato en runtime = JSON leído con fs (better-sqlite3
# es un módulo nativo que NO carga en Netlify Functions — por eso el GTFS migró a
# gtfs-v2.json y por eso R60 migró TODOS los horarios a data/sched/*.json: antes
# "próximos horarios" estaba muerto en prod, schedule.db ni se subía y
# metro-schedule.db no podía abrirse).
[functions]
  included_files = [
    "data/gtfs-v2.json",
    "data/sched/*.json",
    "data/mvd-pois.json",
    "data/variant_to_line.json",
    "data/line-hours.json",
    "data/interior-stops.json",
    "public/interdept.json",
    "public/interior-cities.json"
  ]
  node_bundler = "nft"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(self), microphone=(self), camera=()"
    # HSTS: forzar HTTPS por 1 año (la PWA ya corre en HTTPS en Netlify).
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    # CSP balanceado: bloquea XSS sin romper la app. 'unsafe-inline' en script/style
    # es necesario por los estilos inline de framer-motion y Leaflet (sin nonce server).
    # connect-src lista las APIs que el cliente llama; img permite tiles CARTO + data/blob.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://unpkg.com; img-src 'self' data: blob: https://*.basemaps.cartocdn.com https://*.tile.openstreetmap.org; font-src 'self' data:; connect-src 'self' https://*.supabase.co https://*.basemaps.cartocdn.com https://routing.openstreetmap.de https://router.project-osrm.org https://nominatim.openstreetmap.org https://api.montevideo.gub.uy https://m.montevideo.gub.uy https://direcciones.ide.uy; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Datasets estáticos pesados (routes.json 5.5MB, stops.json 1.5MB, etc.): cambian solo
# al regenerar el GTFS. Cacheá 1 día con revalidación → en visitas repetidas cargan del
# cache (instantáneo, sin re-bajar megas). stale-while-revalidate sirve el viejo mientras
# baja el nuevo en segundo plano (mejor performance percibida, best practice 2026).
[[headers]]
  for = "/routes.json"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"
[[headers]]
  for = "/stops.json"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"
[[headers]]
  for = "/line-shapes.json"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"
[[headers]]
  for = "/stop-dirs.json"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"
[[headers]]
  for = "/operators.json"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"
