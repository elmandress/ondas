[build]
  # No declaramos `publish`: el adaptador oficial de Netlify para Next.js
  # (OpenNext) detecta el output y monta las funciones server-side
  # automáticamente. Si seteamos publish=".next" Netlify trata la carpeta
  # como estática y devuelve 404 porque no hay index.html (Next 16 con App
  # Router no genera uno: las páginas son server-rendered).
  #
  # Tampoco declaramos [[plugins]] @netlify/plugin-nextjs: la doc oficial
  # recomienda NO pinearlo — Netlify aplica la última versión en cada build.
  command = "npm run build"

[build.environment]
  NODE_VERSION = "22"
  NEXT_TELEMETRY_DISABLED = "1"
  # better-sqlite3 necesita compilarse contra el Node de Netlify Functions
  NPM_FLAGS = "--include=optional"

# Bundlear los archivos de datos que el server lee en runtime dentro de las API
# routes serverless. CRÍTICO: el código usa gtfs-v2.db (recorridos+variantes nuevas,
# ej. línea 582) y metro-schedule.db; si no se incluyen, en producción cae al gtfs.db
# v1 viejo → "No se encontró el recorrido" para líneas que sí existen. schedule.db
# (84MB) NO entra en una function de Netlify → la app degrada al GTFS para horarios.
[functions]
  included_files = [
    "data/gtfs-v2.db",
    "data/metro-schedule.db",
    "data/mvd-pois.json",
    "data/variant_to_line.json",
    "data/line-hours.json",
    "data/interior-stops.json",
    "public/interdept.json",
    "public/interior-cities.json"
  ]
  external_node_modules = ["better-sqlite3"]
  node_bundler = "nft"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(self)"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
